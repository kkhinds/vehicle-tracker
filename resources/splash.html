<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Vehicle Tracker</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      user-select: none;
      -webkit-user-select: none;
    }
    .splash {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      border-radius: 16px;
      border: 1px solid rgba(59, 130, 246, 0.15);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      gap: 18px;
      -webkit-app-region: drag;
    }
    .logo {
      width: 96px;
      height: 96px;
      filter: drop-shadow(0 8px 24px rgba(59, 130, 246, 0.45));
      animation: floaty 2.6s ease-in-out infinite;
    }
    @keyframes floaty {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-6px); }
    }
    .title {
      color: #f1f5f9;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.01em;
      margin: 0;
    }
    .byline {
      color: #94a3b8;
      font-size: 12px;
      font-weight: 400;
      margin: -10px 0 0 0;
    }
    .spinner {
      margin-top: 4px;
      width: 28px;
      height: 28px;
      border: 2px solid rgba(148, 163, 184, 0.18);
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status {
      position: absolute;
      bottom: 18px;
      left: 0;
      right: 0;
      text-align: center;
      color: #64748b;
      font-size: 11px;
    }
  </style>
</head>
<body>
  <div class="splash">
    <img class="logo" src="logo.svg" alt="" />
    <h1 class="title">Vehicle Tracker</h1>
    <p class="byline">by Kemar Hinds</p>
    <div class="spinner"></div>
  </div>
  <p class="status">Loading your vehicles…</p>
</body>
</html>
