<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Vehicle Tracker</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      user-select: none;
      -webkit-user-select: none;
    }
    .splash {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      border-radius: 16px;
      border: 1px solid rgba(59, 130, 246, 0.15);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      gap: 18px;
      -webkit-app-region: drag;
    }
    .logo {
      width: 96px;
      height: 96px;
      filter: drop-shadow(0 8px 24px rgba(59, 130, 246, 0.45));
      animation: floaty 2.6s ease-in-out infinite;
    }
    @keyframes floaty {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-6px); }
    }
    .title {
      color: #f1f5f9;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.01em;
      margin: 0;
    }
    .byline {
      color: #94a3b8;
      font-size: 12px;
      font-weight: 400;
      margin: -10px 0 0 0;
    }
    .spinner {
      margin-top: 4px;
      width: 28px;
      height: 28px;
      border: 2px solid rgba(148, 163, 184, 0.18);
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status {
      position: absolute;
      bottom: 18px;
      left: 0;
      right: 0;
      text-align: center;
      color: #64748b;
      font-size: 11px;
    }
  </style>
</head>
<body>
  <div class="splash">
    <!-- Inline copy of resources/logo.svg so the splash works without separate asset loading -->
    <svg class="logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
      <defs>
        <linearGradient id="vt-bg-s" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#3b82f6"/>
          <stop offset="100%" stop-color="#1d4ed8"/>
        </linearGradient>
        <linearGradient id="vt-body-s" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#ffffff"/>
          <stop offset="100%" stop-color="#e5e7eb"/>
        </linearGradient>
      </defs>
      <rect width="64" height="64" rx="14" fill="url(#vt-bg-s)"/>
      <path d="M 7 42 L 7 36 Q 7 35 8 35 L 11 35 Q 13 31 17 28 L 24 24 Q 27 23 30 23 L 41 23 Q 45 24 48 28 L 53 34 L 56 35 Q 57 35 57 36 L 57 42 L 51 42 Q 51 38 47 38 Q 43 38 43 42 L 21 42 Q 21 38 17 38 Q 13 38 13 42 Z" fill="url(#vt-body-s)"/>
      <path d="M 31 26 L 31 33 L 19 33 Q 18 33 18.5 32 L 23 28 Q 26 26 28 26 Z" fill="#1e3a8a"/>
      <path d="M 33 26 L 41 26 Q 43 26 45 28 L 49 33 L 33 33 Z" fill="#1e3a8a"/>
      <circle cx="17" cy="44" r="6" fill="#0f172a"/>
      <circle cx="17" cy="44" r="3" fill="#94a3b8"/>
      <circle cx="17" cy="44" r="1" fill="#0f172a"/>
      <circle cx="47" cy="44" r="6" fill="#0f172a"/>
      <circle cx="47" cy="44" r="3" fill="#94a3b8"/>
      <circle cx="47" cy="44" r="1" fill="#0f172a"/>
      <circle cx="50" cy="17" r="9" fill="#10b981" stroke="#ffffff" stroke-width="2"/>
      <path d="M 46 17 L 49 20 L 54 14" fill="none" stroke="#ffffff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <h1 class="title">Vehicle Tracker</h1>
    <p class="byline">by Kemar Hinds</p>
    <div class="spinner"></div>
  </div>
  <p class="status">Loading your vehicles…</p>
</body>
</html>
